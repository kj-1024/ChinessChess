<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国象棋 - 网页版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>中国象棋</h1>
            <div class="game-controls">
                <div class="difficulty-selector">
                    <label for="difficulty">电脑难度:</label>
                    <select id="difficulty">
                        <option value="beginner">入门</option>
                        <option value="intermediate">中等</option>
                        <option value="hell">地狱</option>
                    </select>
                </div>
                <button id="new-game">新游戏</button>
                <button id="undo">悔棋</button>
            </div>
        </header>
        
        <main>
            <div class="game-area">
                <div class="game-info">
                    <div class="player-info red">
                        <h3>红方 (玩家)</h3>
                        <div class="captured-pieces" id="red-captured"></div>
                    </div>
                    
                    <div class="board-container">
                        <canvas id="chess-board" width="520" height="580"></canvas>
                        <div class="game-status">
                            <div id="current-turn">红方走棋</div>
                            <div id="game-message"></div>
                        </div>
                    </div>
                    
                    <div class="player-info black">
                        <h3>黑方 (电脑)</h3>
                        <div class="captured-pieces" id="black-captured"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="chess.js"></script>
</body>
</html>
